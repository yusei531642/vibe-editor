name: ci

on:
  push:
    tags-ignore:
      - 'v*'
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev

      - name: Install npm dependencies
        run: npm ci

      - name: TypeScript typecheck
        run: npm run typecheck

      - name: Build renderer
        run: npm run build:vite

      - name: Cargo check
        run: cargo check --locked --manifest-path src-tauri/Cargo.toml --all-targets

      - name: Cargo test
        run: cargo test --locked --manifest-path src-tauri/Cargo.toml

      # Issue #97: 依存関係の脆弱性を CI で検知する。
      #   - npm audit: production deps の moderate 以上で fail。dev-only の脆弱性 (vite/esbuild の
      #     dev server 系 advisory 等) は --omit=dev で除外する。direct dependency に当たるものは
      #     overrides で fix 版に固定済み。
      #   - cargo audit: RustSec の advisory を参照。CI が落ちないようにまずは continue-on-error で
      #     可視化のみ。落とす運用に切り替えるときはここから外す。
      - name: npm audit (production)
        run: npm audit --omit=dev --audit-level=moderate

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Cargo audit
        run: cargo audit --file src-tauri/Cargo.lock
        continue-on-error: true
