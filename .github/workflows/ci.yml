name: ci

on:
  push:
    tags-ignore:
      - 'v*'
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20.19.0
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master @ 2026-04-26
        with:
          toolchain: stable

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@f0deed1e0edfc6a9be95417288c0e1099b1eeec3 # v2.7.7
        with:
          workspaces: ./src-tauri -> target

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev

      - name: Install npm dependencies
        # Issue #258: lockfile を Linux 環境 (WSL Ubuntu) で fresh 再生成し、
        # 全 OS 向け optional native binding (@emnapi/runtime / rollup-linux-* /
        # esbuild/linux-* 等) を含めた状態で main にコミット済み。これにより
        # npm CLI の OS-specific transitive deps バグ (npm/cli#4828) を回避しつつ、
        # `npm ci` の strict lockfile check を再度通せるようになった。
        run: npm ci --no-audit --no-fund

      - name: TypeScript typecheck
        run: npm run typecheck

      # Issue #721: ESLint flat config (eslint.config.mjs) によるベースライン lint。
      # 現状はエラー 0 で通る最小ルールセット (将来 PR で段階的に厳格化する)。
      - name: ESLint
        run: npm run lint

      # Issue #721: renderer の単体テスト (vitest) を CI で実行する。
      # 従来は package.json に test スクリプトと vitest.config.ts があるのに
      # CI で一度も走らず、renderer のリグレッションがフリーパスだった。
      - name: Vitest
        run: npm test

      - name: Build renderer
        run: npm run build:vite

      - name: Cargo check
        run: cargo check --locked --manifest-path src-tauri/Cargo.toml --all-targets

      - name: Cargo test
        run: cargo test --locked --manifest-path src-tauri/Cargo.toml

      # Issue #97: 依存関係の脆弱性を CI で検知する。
      #   - npm audit: production deps の moderate 以上で fail。dev-only の脆弱性 (vite/esbuild の
      #     dev server 系 advisory 等) は --omit=dev で除外する。direct dependency に当たるものは
      #     overrides で fix 版に固定済み。
      #   - cargo audit: src-tauri/.cargo/audit.toml で既知の unmaintained advisory を
      #     明示 ignore しつつ、新規 advisory / vulnerability は fail させる。
      - name: npm audit (production)
        run: npm audit --omit=dev --audit-level=moderate

      # Issue #220: advisory DB ベースの npm audit だけでは、typosquat / 署名不整合 /
      # unsigned publish を検知できない。registry の署名検証も CI で必須化する。
      - name: npm audit signatures
        run: npm audit signatures

      # cargo-audit を毎回 source ビルドすると 1-2 分かかり、Swatinem/rust-cache は
      # ~/.cargo/bin を共有しないため再利用も効きにくい。pre-built バイナリを取得する。
      - name: Install cargo-audit
        uses: taiki-e/install-action@184183c2401be73c3bf42c2e61268aa5855379c1 # v2.78.1
        with:
          tool: cargo-audit

      - name: Cargo audit
        working-directory: src-tauri
        run: cargo audit

  # Issue #721: verify job は ubuntu のみで動くため、`cfg(windows)` の windows-sys /
  # ConPTY 経路や `cfg(target_os = "macos")` のコードが CI で一度もコンパイルされず、
  # OS 固有のビルド破壊が main 入後に初めて発覚していた。Windows / macOS でも
  # `cargo check` を走らせ、cfg-gated コードのコンパイルを保証する。
  # apt 依存は Linux 専用なので、ここでは不要 (cargo check は webkit 等を要求しない)。
  cargo-cfg:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master @ 2026-04-26
        with:
          toolchain: stable

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@f0deed1e0edfc6a9be95417288c0e1099b1eeec3 # v2.7.7
        with:
          workspaces: ./src-tauri -> target

      - name: Cargo check (cfg-gated build)
        run: cargo check --locked --manifest-path src-tauri/Cargo.toml --all-targets

  # Issue #745: 既存の `npm audit` / `cargo audit` は advisory DB ベースの依存脆弱性検査で、
  # 「うっかり API key / token / 暗号鍵をコミットした」を検知できない。
  # trufflehog を CI に乗せて entropy + verified 検証ベースの secrets scan を行い、
  # PR push 時は差分 (base..head)、main / tag push 時は full repo を対象にする。
  # `--only-verified` で credential が実在エンドポイントで通用するもののみ報告 (false positive 抑制)。
  secrets-scan:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # full history が無いと PR の base..head 差分 scan / push の before..after 差分 scan が
          # commit を取得できず "fatal: bad revision" になる。trufflehog の git driver 要件。
          fetch-depth: 0

      - name: Secrets scan (trufflehog, verified-only)
        uses: trufflesecurity/trufflehog@37b77001d0174ebec2fcca2bd83ff83a6d45a3ab # v3.95.3
        with:
          extra_args: --only-verified
