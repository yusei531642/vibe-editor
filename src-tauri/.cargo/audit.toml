[advisories]
ignore = [
  # quick-xml (plist -> tauri の transitive)。fix は >=0.41 だが plist は最新 1.9.0 でも
  # ^0.39.2 要求で追従不能 (Issue #1134)。DoS 系 2 件で、外部 XML を食わせる経路は無い。
  # plist / tauri が quick-xml >=0.41 に移行したら ignore を外して版上げすること。
  "RUSTSEC-2026-0194", # quick-xml: duplicate attribute check の quadratic run time
  "RUSTSEC-2026-0195", # quick-xml: NsReader の unbounded namespace allocation (DoS)
  "RUSTSEC-2024-0413", # atk: gtk-rs GTK3 (wry/tauri 側の移行待ち)
  "RUSTSEC-2024-0416", # atk-sys: gtk-rs GTK3
  "RUSTSEC-2025-0057", # fxhash: selectors -> kuchikiki -> tauri-utils
  "RUSTSEC-2024-0412", # gdk: gtk-rs GTK3
  "RUSTSEC-2024-0418", # gdk-sys: gtk-rs GTK3
  "RUSTSEC-2024-0411", # gdkwayland-sys: gtk-rs GTK3
  "RUSTSEC-2024-0417", # gdkx11: gtk-rs GTK3
  "RUSTSEC-2024-0414", # gdkx11-sys: gtk-rs GTK3
  "RUSTSEC-2024-0415", # gtk: gtk-rs GTK3
  "RUSTSEC-2024-0420", # gtk-sys: gtk-rs GTK3
  "RUSTSEC-2024-0419", # gtk3-macros: gtk-rs GTK3
  "RUSTSEC-2024-0370", # proc-macro-error: upstream archived
  "RUSTSEC-2025-0081", # unic-char-property: unicode 旧系 transitive
  "RUSTSEC-2025-0075", # unic-char-range: unicode 旧系 transitive
  "RUSTSEC-2025-0080", # unic-common: unicode 旧系 transitive
  "RUSTSEC-2025-0100", # unic-ucd-ident: unicode 旧系 transitive
  "RUSTSEC-2025-0098", # unic-ucd-version: unicode 旧系 transitive
]
informational_warnings = ["unmaintained", "unsound", "notice"]

[output]
deny = ["unmaintained"]
format = "terminal"
quiet = false
show_tree = true
